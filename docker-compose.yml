version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: telemetry
      POSTGRES_PASSWORD: telemetry
      POSTGRES_DB: telemetrydb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telemetry -d telemetrydb"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=admin
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq:5672/
      - DATABASE_URL=postgres://telemetry:telemetry@postgres:5432/telemetrydb?sslmode=disable
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8080 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  middleware:
    build: ./middleware
    container_name: middleware
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq:5672/
      - DATABASE_URL=postgres://telemetry:telemetry@postgres:5432/telemetrydb?sslmode=disable
    restart: on-failure
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Testes k6 ──────────────────────────────────────────────────────────────
  # Não sobem com "docker compose up" — precisam ser chamados explicitamente:
  #   docker compose run --rm k6-smoke
  #   docker compose run --rm k6-load
  #   docker compose run --rm k6-stress
  #   docker compose run --rm k6-spike
  #   docker compose run --rm k6-soak
  #   docker compose run --rm k6-validation

  k6-smoke:
    image: grafana/k6:latest
    volumes:
      - ./k6:/k6
      - ./k6/results:/results
    working_dir: /k6
    command: run tests/smoke_test.js
    environment:
      - BASE_URL=http://backend:8080
    depends_on:
      backend:
        condition: service_started
    profiles: [k6]

  k6-load:
    image: grafana/k6:latest
    volumes:
      - ./k6:/k6
      - ./k6/results:/results
    working_dir: /k6
    command: run tests/load_test.js
    environment:
      - BASE_URL=http://backend:8080
    depends_on:
      backend:
        condition: service_started
    profiles: [k6]

  k6-stress:
    image: grafana/k6:latest
    volumes:
      - ./k6:/k6
      - ./k6/results:/results
    working_dir: /k6
    command: run tests/stress_test.js
    environment:
      - BASE_URL=http://backend:8080
    depends_on:
      backend:
        condition: service_started
    profiles: [k6]

  k6-spike:
    image: grafana/k6:latest
    volumes:
      - ./k6:/k6
      - ./k6/results:/results
    working_dir: /k6
    command: run tests/spike_test.js
    environment:
      - BASE_URL=http://backend:8080
    depends_on:
      backend:
        condition: service_started
    profiles: [k6]

  k6-soak:
    image: grafana/k6:latest
    volumes:
      - ./k6:/k6
      - ./k6/results:/results
    working_dir: /k6
    command: run tests/soak_test.js
    environment:
      - BASE_URL=http://backend:8080
    depends_on:
      backend:
        condition: service_started
    profiles: [k6]

  k6-validation:
    image: grafana/k6:latest
    volumes:
      - ./k6:/k6
      - ./k6/results:/results
    working_dir: /k6
    command: run tests/validation_test.js
    environment:
      - BASE_URL=http://backend:8080
    depends_on:
      backend:
        condition: service_started
    profiles: [k6]

volumes:
  postgres_data: